services:
  frontend:
    build:
      context: .
      dockerfile: infra/docker/Dockerfile.frontend
      args:
        VITE_API_URL: /api
    ports:
      - "${FRONTEND_PORT:-8080}:${FRONTEND_PORT:-8080}"
    environment:
      FRONTEND_PORT: "${FRONTEND_PORT:-8080}"
      BACKEND_PORT: "${BACKEND_PORT:-3001}"
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      args:
        PORT: "${BACKEND_PORT:-3001}"
    ports:
      - "${BACKEND_PORT:-3001}:${BACKEND_PORT:-3001}"
    environment:
      # Variables pasadas directamente para evitar interpolación de $ en bcrypt hashes
      DATABASE_URL: "${DATABASE_URL}"
      JWT_SECRET: "${JWT_SECRET}"
      ADMIN_USERNAME: "${ADMIN_USERNAME}"
      # ADMIN_PASSWORD_HASH NO va via env_file — Docker Compose interpola $2b$12$... como variables
      ADMIN_PASSWORD_HASH: "${ADMIN_PASSWORD_HASH}"
      PORT: "${BACKEND_PORT:-3001}"
      CORS_ORIGIN: "${CORS_ORIGIN}"
      RESEND_API_KEY: "${RESEND_API_KEY}"
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: portfolio
      POSTGRES_USER: portfolio_user
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD}"
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./database/migrations:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U portfolio_user -d portfolio"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  pgdata:
