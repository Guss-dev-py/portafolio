services:
  frontend:
    build:
      context: ..
      dockerfile: infra/docker/Dockerfile.frontend
      args:
        VITE_API_URL: /api
    ports:
      - "8080:8080"
    restart: unless-stopped

  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    ports:
      - "3001:3001"
    environment:
      # Variables cargadas directamente para evitar interpolación de $ en bcrypt hashes
      DATABASE_URL: "postgresql://portfolio_user:${POSTGRES_PASSWORD}@postgres:5432/portfolio"
      JWT_SECRET: "${JWT_SECRET}"
      ADMIN_USERNAME: "${ADMIN_USERNAME}"
      # ADMIN_PASSWORD_HASH se pasa como variable de entorno directa — NO via env_file
      # porque Docker Compose interpola los $ del hash bcrypt ($2b$12$...) como variables
      ADMIN_PASSWORD_HASH: "${ADMIN_PASSWORD_HASH}"
      PORT: "3001"
      CORS_ORIGIN: "${CORS_ORIGIN}"
      RESEND_API_KEY: "${RESEND_API_KEY}"
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: portfolio
      POSTGRES_USER: portfolio_user
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD}"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ../database/migrations:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U portfolio_user -d portfolio"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  pgdata:
