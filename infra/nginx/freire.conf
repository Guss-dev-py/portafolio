# Configuración del reverse proxy del host para freire.ucielbustamante.com
# Ubicación en el servidor: /etc/nginx/sites-available/freire.ucielbustamante.com
# Activar con: sudo ln -s /etc/nginx/sites-available/freire.ucielbustamante.com /etc/nginx/sites-enabled/
# Recargar con: sudo nginx -t && sudo systemctl reload nginx

server {
    listen 80;
    server_name freire.ucielbustamante.com;

    # Descomentar tras configurar Certbot para HTTPS:
    # return 301 https://$host$request_uri;

    # Proxy al frontend (SPA React)
    location / {
        proxy_pass http://127.0.0.1:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Proxy al backend (API Express)
    location /api {
        proxy_pass http://127.0.0.1:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

